name: Tests

on:
  push:
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and test dependencies
        run: |
          python -m pip install -r requirements-dev.lock
          python -m pip install -e .
      - name: Lint with ruff
        run: ruff check file_search_tool tests
      - name: Type-check library with mypy
        run: mypy file_search_tool
      - name: Type-check tests with mypy
        run: mypy tests --disable-error-code=no-untyped-def --disable-error-code=no-untyped-call
      - name: Run tests with coverage
        run: python -m pytest --cov=file_search_tool --cov-report=term-missing -q
      - name: Enforce coverage threshold
        run: python -m coverage report --fail-under=99
